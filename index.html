function withTimeout(promise,ms,label){
  return Promise.race([
    promise,
    new Promise((_,rej)=>setTimeout(()=>rej(new Error((label||'Request')+' timed out — the server may be temporarily unavailable. Please try again shortly.')),ms||12000))
  ]);
}

let _saveTimer=null, _workspaceId=null, _workspaceOwnerId=null;
function scheduleCloudSave(){
  if(!sb||!store.account||store.account.accountType!=='contractor')return;
  if(_workspaceId && _workspaceOwnerId && _workspaceOwnerId!==store.account.uid)return; // view-only shared project
  clearTimeout(_saveTimer);
  store.syncState='saving';
  _saveTimer=setTimeout(cloudSave, 1500);
}

// Open a message thread for an order (works for contractor, manager, supplier)
let _msgChannel=null;
let _ordersChannel=null;
function unsubscribeOrders(){
  if(_ordersChannel&&sb){try{sb.removeChannel(_ordersChannel);}catch(e){}_ordersChannel=null;}
}
function subscribeOrders(){
  unsubscribeOrders();
  if(!sb||!store.account)return;
  const acct=store.account.accountType;
  _ordersChannel=sb.channel('orders-'+store.account.uid)
    .on('postgres_changes',{event:'*',schema:'public',table:'orders'},(payload)=>{
      const row=payload.new||payload.old;
      if(!row)return;
      // only react to orders relevant to me, then refresh the right list
      let relevant=false;
      if(acct==='contractor' && row.contractor_id===store.account.uid) relevant=true;
      if(acct==='manager' && row.company_id===store.account.companyId) relevant=true;
      if(acct==='supplier' && row.supplier_id===store.account.uid) relevant=true;
      if(!relevant)return;
      if(acct==='contractor'){ store.myOrdersLoaded=false; loadMyOrders(); }
      else if(acct==='manager'){ store.apprLoaded=false; loadApprovals(); }
      else if(acct==='supplier'){ store.incomingLoaded=false; loadIncoming(); }
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'recipient_id=eq.'+store.account.uid},(payload)=>{
      const m=payload.new; if(!m||!m.order_id)return;
      // if this order's thread is open, it'll be marked read; otherwise bump the badge
      if(store.threadOrderId===m.order_id)return;
      store.unreadByOrder={...store.unreadByOrder,[m.order_id]:(store.unreadByOrder[m.order_id]||0)+1};
      render();
    })
    .subscribe();
}
function unsubscribeThread(){
  if(_msgChannel&&sb){try{sb.removeChannel(_msgChannel);}catch(e){}_msgChannel=null;}
}
function subscribeThread(orderId){
  unsubscribeThread();
  if(!sb)return;
  _msgChannel=sb.channel('msgs-'+orderId)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'order_id=eq.'+orderId},(payload)=>{
      const m=payload.new;
      if(!m)return;
      // only if this thread is still the open one
      if(store.threadOrderId!==orderId)return;
      // avoid duplicates (my own just-sent message may already be in the list)
      if((store.threadMsgs||[]).some(x=>x.id===m.id))return;
      store.threadMsgs=[...(store.threadMsgs||[]),m];
      // if it's addressed to me, mark read
      if(m.recipient_id===store.account.uid){try{sb.from('messages').update({read:true}).eq('id',m.id);}catch(e){}}
      render();
    })
    .subscribe();
}

// figure out who the recipient is for a message, given the order and who I am
function threadRecipient(order){
  const me=store.account.uid;
  // If I'm the contractor: route by where the order is in its life.
  // Once it's been sent to a supplier, I'm talking to the supplier.
  // Before that (during approval), I'm talking to the manager/approver.
  if(order.contractor_id===me){
    if((order.status==='sent'||order.status==='actioned') && order.supplier_id) return order.supplier_id;
    return order.approver_id||order.supplier_id||null;
  }
  // if I'm the manager/approver, send to the contractor
  if(order.approver_id===me){ return order.contractor_id; }
  // if I'm the supplier, send to the contractor
  if(order.supplier_id===me){ return order.contractor_id; }
  // fallback: contractor
  return order.contractor_id;
}
async function sendMessage(orderId){
  const input=document.getElementById('msgInput');

  const order=(store.myOrders||[]).find(o=>o.id===orderId)||(store.approvals||[]).find(o=>o.id===orderId)||(store.incoming||[]).find(o=>o.id===orderId);
  if(!order){alert('Order not found.');return;}
  const recipient=threadRecipient(order);
  const row={ order_id:orderId, sender_id:store.account.uid, sender_name:store.account.name||store.account.email, recipient_id:recipient||store.account.uid, body, read:false };
  try{

    input.value='';
    await loadThread(orderId);
  }catch(e){alert('Could not send: '+e.message);}
}

// Contractor submits an order (one supplier or all) for manager approval
async function submitOrderForApproval(lines, total, supplierName){
  if(!sb||!store.account){alert('Not connected.');return;}
  if(!store.account.companyId){alert('Your account has no company set, so there is no manager to approve. Ask your admin to set your company.');return;}
  // find the most recent prior order for this supplier in this project
  const prior=(store.myOrders||[])
    .filter(o=>o.supplier_name===(supplierName||'(multiple)') && o.project_id===_workspaceId)
    .sort((a,b)=>(b.revision||1)-(a.revision||1))[0];
  let revision=1, supersedes=null;
  if(prior){
    if(prior.status==='pending_approval'){
      alert(`This project's order to ${supplierName||'suppliers'} is already pending approval (Revision ${prior.revision||1}). Wait for your manager to act, or it will be confusing to send another version now.`);
      return;
    }
    // prior was approved/rejected/sent — this becomes a new revision.
    if(prior.status==='approved'){
      const ok=confirm(`The previous order (Revision ${prior.revision||1}) was already APPROVED. Submitting a revision will supersede it and need fresh approval. Continue?`);
      if(!ok)return;
    }
    revision=(prior.revision||1)+1;
    supersedes=prior.id;
  }
  // mark which lines are newly added vs the prior revision (by item label + supplier)
  let lineSet=lines;
  if(prior&&Array.isArray(prior.items)){
    const priorKeys=new Set(prior.items.map(it=>`${it.item||it.name||''}|${it.supplier||''}`));
    lineSet=lines.map(l=>({...l, isNew:!priorKeys.has(`${l.item||l.name||''}|${l.supplier||''}`)}));
  }
  // resolve supplier account id by name
  let supplierId=null;
  if(supplierName&&supplierName!=='(multiple)'){
    try{const {data}=await sb.from('supplier_profiles').select('id').eq('supplier_name',supplierName).maybeSingle();if(data)supplierId=data.id;}catch(e){}
  }
  const row={
    contractor_id:store.account.uid, contractor_name:store.account.name, contractor_company:store.account.company,
    company_id:store.account.companyId, supplier_id:supplierId, supplier_name:supplierName||'(multiple)',
    project_id:_workspaceId, project_name:store.projectName||'Untitled project',
    revision, supersedes,
    items:lineSet, total:total, currency:store.currency, status:'pending_approval'
  };
  try{
    const {error}=await sb.from('orders').insert(row);
    if(error){alert('Could not submit: '+error.message);return;}
    alert(revision>1?`✓ Revision ${revision} submitted for approval. New items are highlighted for your manager.`:'✓ Submitted for approval. Your manager will see it when they log in.');
    store.myOrdersLoaded=false; loadMyOrders();
  }catch(e){alert('Could not submit: '+e.message);}
}

// Contractor sends an APPROVED order to the supplier's inbox
async function sendToSupplier(orderId){
  if(!sb)return;
  const o=(store.myOrders||[]).find(x=>x.id===orderId);
  if(!o){alert('Order not found.');return;}
  if(o.status!=='approved'){alert('Only approved orders can be sent to the supplier.');return;}
  let supplierId=o.supplier_id;
  if(!supplierId && o.supplier_name && o.supplier_name!=='(multiple)'){
    try{const {data}=await sb.from('supplier_profiles').select('id').eq('supplier_name',o.supplier_name).maybeSingle();if(data)supplierId=data.id;}catch(e){}
  }
  if(o.supplier_name==='(multiple)'){
    alert('This is a whole-order submission covering multiple suppliers. Send the per-supplier orders individually so each supplier gets their own part.');
    return;
  }
  if(!supplierId){
    alert(`Can't send: "${o.supplier_name}" isn't a PitchIQ supplier account, so there's no inbox to send to. This works for suppliers on PitchIQ (items pulled from the Catalogue carry their account).`);

// Copy a catalogue item into the contractor's own Price Book, in the best-fit section
function useCatalogueItem(id){
  const c=(store.catalogueAll||[]).find(x=>x.id===id);if(!c)return;
  const sup=c.supplier_name||'Catalogue';
  const k=(c.kind||'').toLowerCase();
  // decide which price-book section by the data present, falling back to category text
  if(c.width&&c.height){
    store.priceBook.sheet.push({supplier:sup,code:c.code||'',thk:+c.thk||0,w:+c.width||0,h:+c.height||0,price:+c.price||0});
  }else if(c.length||k.includes('stud')||k.includes('track')||k.includes('linear')||k.includes('channel')||k.includes('lip')){
    store.priceBook.linear.push({supplier:sup,code:c.code||'',thk:+c.thk||0,len:+c.length||0,price:+c.price||0});

    store.priceBook.paint.push({supplier:sup,code:c.code||'',price:+c.price||0});

    store.priceBook.ancillary.push({supplier:sup,code:c.code||'',desc:c.description||c.kind||'',unit:c.unit||'each',price:+c.price||0});

const prefKey=(code,thk)=>(code||'')+'|'+(thk==null?'':thk);
function pickOffer(matches, code, thk){
  if(!matches.length) return {price:0, supplier:null, offers:[], pinned:false, fellBack:false};
  const pinned=store.supplierPrefs[prefKey(code,thk)];
  let chosen=null, fellBack=false;
  if(pinned){
    chosen=matches.find(m=>m.supplier===pinned);
    if(!chosen) fellBack=true; // pinned supplier doesn't stock this size
  }
  if(!chosen) chosen=[...matches].sort((a,b)=>a.price-b.price)[0];
  return {price:chosen?chosen.price:0, supplier:chosen?chosen.supplier:null, offers:matches, pinned:!!pinned, fellBack};
}
const offerLinear=(code,thk,len)=>pickOffer(store.priceBook.linear.filter(x=>x.code===code&&x.thk===thk&&x.len===len),code,thk);
const offerSheet=(code,thk,w,h)=>pickOffer(store.priceBook.sheet.filter(x=>x.code===code&&x.thk===thk&&x.w===w&&x.h===h),code,thk);
const offerPaint=code=>pickOffer(store.priceBook.paint.filter(x=>x.code===code),code,null);
// back-compat: price-only helpers
const priceLinear=(code,thk,len)=>offerLinear(code,thk,len).price;
const priceSheet=(code,thk,w,h)=>offerSheet(code,thk,w,h).price;
const pricePaint=code=>offerPaint(code).price;
const allSuppliers=()=>{const s=new Set();['linear','sheet','paint'].forEach(k=>store.priceBook[k].forEach(e=>e.supplier&&s.add(e.supplier)));return [...s].sort();};
// ---- offcut bank matching: same code AND thickness, big enough ----
const matchBank=(code,thk,need)=>store.bankedDrops.find(d=>d.code===code && d.thk===thk && d.size>=need);

// ---- ancillary offer lookup ----

const ancMeta=code=>{const e=(store.priceBook.ancillary||[]).find(x=>x.code===code);return e?{desc:e.desc,unit:e.unit}:{desc:code,unit:'each'};};

// Cost an assembly row's BoM, returning [{line, supplier, cost}]
function assemblyCost(row){
  const tpl=ASSEMBLIES[row.type]; if(!tpl) return {items:[], total:0};
  const items=tpl.compute(row.params).map(it=>{
    let price=0, supplier='—';
    if(it.kind==='linear'){const o=offerLinear(it.code,it.thk,it.len);price=o.price;supplier=o.supplier||'—';}
    else if(it.kind==='sheet'){const o=offerSheet(it.code,it.thk,it.w,it.h);price=o.price;supplier=o.supplier||'—';}
    else if(it.kind==='anc'){const o=offerAncillary(it.code);price=o.price;supplier=o.supplier||'—';if(!it.unit){it.unit=ancMeta(it.code).unit;}}
    return {...it, price, supplier, cost:price*it.qty};
  });
  return {items, total:items.reduce((s,i)=>s+i.cost,0)};
}

// all known codes across the price book, for the custom-assembly picker
function allKnownItems(){
  const out=[];
  (store.priceBook.ancillary||[]).forEach(e=>out.push({code:e.code,desc:e.desc,unit:e.unit,price:e.price,supplier:e.supplier}));
  store.priceBook.linear.forEach(e=>out.push({code:e.code,desc:e.code+' '+e.thk+'mm @ '+e.len,unit:'length',price:e.price,supplier:e.supplier}));
  store.priceBook.sheet.forEach(e=>out.push({code:e.code,desc:e.code+' '+e.thk+'mm '+e.w+'x'+e.h,unit:'sheet',price:e.price,supplier:e.supplier}));
  store.priceBook.paint.forEach(e=>out.push({code:e.code,desc:e.code+' (paint)',unit:'L',price:e.price,supplier:e.supplier}));
  // de-dup by code
  const seen={};return out.filter(i=>{if(seen[i.code])return false;seen[i.code]=1;return true;});
}
// cost a custom assembly: each line is {name, code, qty, unit, price}
// if a code matches the price book, pull its live price+supplier; else use the typed price
function customCost(ca){
  const items=(ca.lines||[]).map(ln=>{
    let price=+ln.price||0, supplier=ln.supplier||'(manual)';
    if(ln.code){const o=offerAncillary(ln.code);if(o.price>0){price=o.price;supplier=o.supplier||supplier;}
      else{const k=allKnownItems().find(i=>i.code===ln.code);if(k){price=k.price;supplier=k.supplier||supplier;}}}
    return {...ln, price, supplier, cost:price*(+ln.qty||0)};
  });
  return {items, total:items.reduce((s,i)=>s+i.cost,0)};
}
function optimiseLinear(stockLen,kerf,cuts){
  const pieces=[];cuts.forEach(c=>{for(let i=0;i<c.qty;i++)pieces.push({len:c.len});});
  pieces.sort((a,b)=>b.len-a.len);
  const bars=[];let fresh=0;
  pieces.forEach(p=>{let placed=false;
    for(const bar of bars){const need=p.len+(bar.cuts.length?kerf:0);if(bar.remaining>=need){bar.cuts.push(p);bar.remaining-=need;placed=true;break;}}
    if(!placed){bars.push({cuts:[p],remaining:stockLen-p.len,capacity:stockLen});fresh++;}});
  const used=bars.filter(b=>b.cuts.length);
  const totalStock=fresh*stockLen, totalUsed=pieces.reduce((s,p)=>s+p.len,0);
  const kerfTotal=used.reduce((s,b)=>s+Math.max(0,b.cuts.length-1)*kerf,0);
  const wastePct=totalStock>0?Math.max(0,totalStock-totalUsed-kerfTotal)/totalStock*100:0;
  const newDrops=used.filter(b=>b.remaining>0).map(b=>Math.round(b.remaining));
  return {bars:used,barCount:fresh,wastePct,newDrops};
}

// ---- guillotine sheet packer ----
function packGuillotine(sheetW,sheetH,kerf,parts){
  // each part may carry rot:true meaning it can be rotated 90° for best fit (no-grain)
  const sorted=[...parts].sort((a,b)=>(b.w*b.h)-(a.w*a.h));
  const sheets=[];
  const newSheet=()=>({free:[{x:0,y:0,w:sheetW,h:sheetH}],placed:[]});
  // find the best free rectangle for a piece at a given w/h; returns {idx,score} or null
  function bestFit(sheet,w,h){
    let best=-1,bestScore=Infinity;
    for(let i=0;i<sheet.free.length;i++){const f=sheet.free[i];
      if(w<=f.w&&h<=f.h){const sc=Math.min(f.w-w,f.h-h);if(sc<bestScore){bestScore=sc;best=i;}}}
    return best<0?null:{idx:best,score:bestScore};
  }
  function tryPlace(sheet,p){
    // option A: as-is
    let chosen={w:p.w,h:p.h,fit:bestFit(sheet,p.w,p.h)};
    // option B: rotated 90° (only if allowed and not square)
    if(p.rot && p.w!==p.h){
      const fitR=bestFit(sheet,p.h,p.w);
      if(fitR && (!chosen.fit || fitR.score<chosen.fit.score)){
        chosen={w:p.h,h:p.w,fit:fitR};
      }
    }
    if(!chosen.fit)return false;
    const f=sheet.free[chosen.fit.idx];
    sheet.placed.push({w:chosen.w,h:chosen.h,x:f.x,y:f.y,ref:p.ref,label:p.label,code:p.code,item:p.item,grainless:!!p.grainless});
    const rW=f.w-chosen.w-kerf,bH=f.h-chosen.h-kerf;
    sheet.free.splice(chosen.fit.idx,1);
    if(rW>0)sheet.free.push({x:f.x+chosen.w+kerf,y:f.y,w:rW,h:chosen.h});
    if(bH>0)sheet.free.push({x:f.x,y:f.y+chosen.h+kerf,w:f.w,h:bH});
    return true;
  }
  sorted.forEach(p=>{let placed=false;for(const s of sheets){if(tryPlace(s,p)){placed=true;break;}}if(!placed){const s=newSheet();tryPlace(s,p);sheets.push(s);}});
  const usedArea=sorted.reduce((s,p)=>s+p.w*p.h,0),total=sheets.length*sheetW*sheetH;
  return {sheets:sheets.map(s=>({parts:s.placed,free:s.free})),sheetCount:sheets.length,wastePct:total>0?(total-usedArea)/total*100:0};
}
function optimiseSheets(sheetW,sheetH,kerf,grain,parts){
  const items=[];
  parts.forEach((p,pi)=>{
    // build a per-row reference once; number the copies within the row
    for(let i=0;i<p.qty;i++){
      const baseRef=(typeof pieceRef==='function')?pieceRef(p,pi):'';
      const ref=baseRef+' · '+(i+1)+' of '+p.qty;
      const item=(typeof itemName==='function')?itemName(p):'';
      items.push({w:p.cw,h:p.ch,ref:ref,label:p.label||'',code:p.code||'',item:item});
    }
  });
  const orient=it=>{
    if(grain==='across')return {w:it.h,h:it.w,rot:false,ref:it.ref,label:it.label,code:it.code,item:it.item};
    if(grain==='none')return {w:it.w,h:it.h,rot:true,grainless:true,ref:it.ref,label:it.label,code:it.code,item:it.item};
    return {w:it.w,h:it.h,rot:false,ref:it.ref,label:it.label,code:it.code,item:it.item};
  };
  let mapped=items.map(orient);

  // ---- Stage 2: reuse banked sheet offcuts first (by code + thickness) ----
  let offcutSheets=[]; let offcutsUsed=0;
  if(store.reuseSheetOffcuts){
    const code=(store.sheetCode||'').toUpperCase(), thk=+store.sheetThk||0;
    // matching banked sheet offcuts, biggest first
    const banks=(store.bankedDrops||[]).filter(d=>d.kind==='sheet' && (d.code||'').toUpperCase()===code && (+d.thk||0)===thk && d.w>0 && d.h>0)
      .sort((a,b)=>(b.w*b.h)-(a.w*a.h));
    for(const b of banks){
      if(!mapped.length)break;
      // try to pack remaining pieces onto this single offcut "board"
      const r=packGuillotine(b.w,b.h,kerf,mapped);
      // keep only the FIRST offcut-board worth of placements, return the rest to the pool
      if(r.sheets.length && r.sheets[0].parts.length){
        const placed=r.sheets[0].parts;
        offcutSheets.push({parts:placed,fromOffcut:true,offcutW:b.w,offcutH:b.h});
        offcutsUsed++;
        // remove the placed pieces from mapped (match by ref, which is unique per piece)
        const placedRefs={}; placed.forEach(p=>{placedRefs[p.ref]=(placedRefs[p.ref]||0)+1;});
        const remain=[];
        mapped.forEach(m=>{ if(placedRefs[m.ref]>0){placedRefs[m.ref]--;} else remain.push(m); });
        mapped=remain;
      }
    }
  }

  // ---- remaining pieces go onto fresh full boards ----
  const fresh=packGuillotine(sheetW,sheetH,kerf,mapped);
  // combine: offcut boards first, then fresh boards
  const allSheets=offcutSheets.concat(fresh.sheets);
  // waste % is measured against FRESH boards only (offcuts were "free" leftovers)
  return {sheets:allSheets, sheetCount:fresh.sheetCount, offcutsUsed, wastePct:fresh.wastePct};
}
const sheetWaste=(w,h,k,g,p)=>optimiseSheets(w,h,k,g,p).wastePct;

// Auto-bank usable leftover offcuts from the current sheet job.
// Replaces (not duplicates) this job's auto entries each time. Match key: code+thk.
const OFFCUT_MIN=200; // ignore scraps smaller than this (mm) on the long side
function autoBankSheetOffcuts(res){
  if(!store.bankedDrops)store.bankedDrops=[];
  const code=store.sheetCode||'', thk=store.sheetThk||0;
  const grainTxt=store.grain==='along'?'Along':store.grain==='across'?'Across':'None';
  // remove previous auto entries for THIS job signature (code+thk), keep manual & other jobs
  const sig='auto:'+code+':'+thk;
  store.bankedDrops=store.bankedDrops.filter(d=>d._auto!==sig);
  if(!res||!res.sheets||!res.sheets.length)return;
  // collect usable free rectangles across sheets
  const offs=[];
  res.sheets.forEach(s=>{(s.free||[]).forEach(f=>{
    const lng=Math.max(f.w,f.h), shrt=Math.min(f.w,f.h);
    if(lng>=OFFCUT_MIN && shrt>=OFFCUT_MIN){ offs.push({w:Math.round(f.w),h:Math.round(f.h)}); }
  });});
  // add them tagged with the job signature
  const today=new Date().toLocaleDateString();
  offs.forEach((o,i)=>{
    store.bankedDrops.push({id:Date.now()+i, _auto:sig, kind:'sheet', code, thk,
      material:store.sheetCode||'Sheet', w:o.w, h:o.h, grain:grainTxt, finish:'',
      size:Math.max(o.w,o.h), zone:'Auto (from cut)', date:today});
  });
}

// lip on an edge reduces the perpendicular dimension; perimeter trim adds oversize on all 4 edges
// site-fit check: does the finished panel fit the site opening?
// uses the panel's own siteW/siteH, OR the zone's site limit if set.
function siteLimitFor(r){
  let sw=+r.siteW||0, sh=+r.siteH||0;
  const zl=(store.zoneSiteLimits||{})[r.zone];
  if(zl){ if(!sw&&zl.w)sw=zl.w; if(!sh&&zl.h)sh=zl.h; }
  return {sw,sh};
}
function fitIndicator(r){
  const {sw,sh}=siteLimitFor(r);
  if(!sw&&!sh)return '<span style="color:var(--mut);font-size:10px">—</span>';
  const tol=+store.siteTol||0; // optional clearance: item should be this much smaller
  const overW = sw>0 && (r.w > sw - tol);
  const overH = sh>0 && (r.h > sh - tol);
  if(overW||overH){
    const msgs=[];
    if(overW)msgs.push(`W ${fmt(r.w)}>${fmt(sw)}`);
    if(overH)msgs.push(`H ${fmt(r.h)}>${fmt(sh)}`);
    return `<span style="color:#fff;background:var(--red);padding:2px 6px;border-radius:3px;font-size:10px;font-weight:700;white-space:nowrap" title="Item exceeds site space">⚠ ${msgs.join(' · ')}</span>`;
  }
  return '<span style="color:var(--green);font-size:11px;font-weight:700" title="Fits the site space">✓ fits</span>';
}
function cutSize(r){const t=r.lip||0,e=r.edge||'0';let dw=0,dh=0;
  if(e==='1w')dh=t;else if(e==='2w')dh=2*t;else if(e==='1h')dw=t;else if(e==='2h')dw=2*t;else if(e==='all'){dw=2*t;dh=2*t;}
  const trim=Math.max(0,+store.sheetTrim||0); // cleaning trim on every edge -> +2*trim each way
  return {cw:Math.max(0,r.w-dw)+2*trim,ch:Math.max(0,r.h-dh)+2*trim};}

// ---- lipping length (mm) per panel based on lipped edges ----
// A "width edge" runs along the W side (horizontal, top/bottom) so its length = W.
// A "height edge" runs along the H side (vertical, left/right) so its length = H.
function lipLenPerPanel(r){
  const e=r.edge||'0';
  if(e==='1w')return r.w;
  if(e==='2w')return 2*r.w;
  if(e==='1h')return r.h;
  if(e==='2h')return 2*r.h;
  if(e==='all')return 2*r.w+2*r.h;
  return 0;
}
// Aggregate lipping demand across panel rows -> [{code, thk, stockLen, totalMM, withWasteMM, lengthsToBuy, supplier, unitPrice, cost}]
function lipDemand(rows){
  const buckets={};
  rows.forEach(r=>{
    if(!r.lipCode||!r.lip||!r.edge||r.edge==='0')return;
    const stockLen=+r.lipLen||3600;
    const k=r.lipCode+'|'+r.lip+'|'+stockLen;
    if(!buckets[k])buckets[k]={code:r.lipCode,thk:r.lip,stockLen,totalMM:0};
    buckets[k].totalMM+=lipLenPerPanel(r)*r.qty;
  });
  const wastePct=(+store.lipWaste||0)/100;
  return Object.values(buckets).map(b=>{
    const withWasteMM=b.totalMM*(1+wastePct);
    const lengthsToBuy=Math.ceil(withWasteMM/b.stockLen);
    const off=offerLinear(b.code,b.thk,b.stockLen);
    return {...b, withWasteMM, lengthsToBuy, supplier:off.supplier||'—', unitPrice:off.price, cost:lengthsToBuy*off.price, fellBack:off.fellBack};
  });
}

// ---- paint: litres + cost ----
// per-piece sheet finish areas (m²) split by primer vs paint, based on pfinish choice
function sheetFinishArea(){
  let primeM2=0, paintM2=0;
  const rows=store.zoneFilter==='all'?store.sheetRows:store.sheetRows.filter(r=>r.zone===+store.zoneFilter);
  rows.forEach(r=>{
    const fin=r.pfinish||'none'; if(fin==='none')return;
    const faces=Math.max(1,+r.paintFaces||1);
    const oneFace=(r.w||0)*(r.h||0)/1e6;
    const baseArea=oneFace*faces*(r.qty||0);
    if(fin==='prime'||fin==='both'){ primeM2 += baseArea*(store.primerCoats||1); }
    if(fin==='paint'||fin==='both'){ paintM2 += baseArea*(store.paintCoats||2); }
  });
  return {primeM2, paintM2};
}
function sheetPrimerCalc(){
  const {primeM2}=sheetFinishArea();
  const spread=store.primerSpread||10, waste=(store.primerWaste||10)/100;
  const litres=spread>0?(primeM2/spread)*(1+waste):0;
  const o=offerPaint(store.primerCode||'PRIMER-WHT');
  return {area:primeM2, litres, cost:litres*o.price, supplier:o.supplier, price:o.price};
}
function sheetPaintCalc(){
  const {paintM2}=sheetFinishArea();
  const spread=store.sheetPaintSpread||11, waste=(store.sheetPaintWaste||10)/100;
  const litres=spread>0?(paintM2/spread)*(1+waste):0;
  const o=offerPaint(store.sheetPaintCode||'PNT-WHT-MATT');
  return {area:paintM2, litres, cost:litres*o.price, supplier:o.supplier, price:o.price};
}
// ---- auto-accessories: count parts across sheet panels, generate hardware ----
function sheetAccessories(){
  const R=store.accRules||{};
  const rows=store.zoneFilter==='all'?store.sheetRows:store.sheetRows.filter(r=>r.zone===+store.zoneFilter);
  const acc={}; // code -> qty
  const add=(code,n)=>{if(!code||n<=0)return;acc[code]=(acc[code]||0)+n;};
  const C=store.accCodes||{};
  const carcass=(R.carcassParts||['Side','Top','Bottom','Back']);
  rows.forEach(r=>{
    const part=r.part||''; const qty=Math.max(0,+r.qty||0); if(!part||qty<=0)return;
    if(part==='Door'){
      // hinges scale by door height (use final H)
      const h=+r.h||0; const band=(R.hingeBands||[]).find(b=>h<=b.max)||{n:2};
      add(C.hinge, band.n*qty);
      add(C.handle,(R.handlesPerDoor||1)*qty);
    } else if(part==='Shelf'){
      add(C.pin,(R.shelfPins||4)*qty);
    } else if(part==='Drawer front'){
      add(C.runner,(R.runnerPairs||1)*qty);
      add(C.handle,(R.handlesPerDrawer||1)*qty);
    } else if(carcass.includes(part)){
      add(C.dowel,(R.dowelsPerCarcass||4)*qty);
      add(C.screw,(R.screwsPerCarcass||4)*qty);
    }
  });
  // turn into rows with price from catalogue/price book
  return Object.entries(acc).map(([code,qty])=>{
    const o=offerAccessory(code);
    return {code, qty, supplier:o.supplier, price:o.price, cost:o.price*qty};
  }).filter(a=>a.qty>0);
}
// find a price for an accessory code from the price book / catalogue (best/cheapest)
function offerAccessory(code){
  let best=null;
  (store.catalogueAll||[]).forEach(c=>{if((c.code||'').toUpperCase()===code.toUpperCase()&&c.price>0){if(!best||c.price<best.price)best={price:c.price,supplier:c.supplier_name};}});
  (store.myCatalogue||[]).forEach(c=>{if((c.code||'').toUpperCase()===code.toUpperCase()&&c.price>0){if(!best||c.price<best.price)best={price:c.price,supplier:'You'};}});
  return best||{price:0,supplier:null};
}
function paintCalc(r){
  const area=r.area||0, coats=r.coats||1, spread=r.spread||10, waste=(r.waste||0)/100;
  const litres=spread>0?(area*coats/spread)*(1+waste):0;
  const o=offerPaint(r.code);
  return {litres, cost:litres*o.price, supplier:o.supplier, pinned:o.pinned, fellBack:o.fellBack, offers:o.offers};
}

async function loadApprovals(){
  if(!sb||!store.account)return;
  try{const {data}=await sb.from('orders').select('*').eq('company_id',store.account.companyId).order('created_at',{ascending:false});store.approvals=data||[];}catch(e){store.approvals=[];}

}
async function setApproval(id,status){
  if(!sb)return;
  if(status==='approved'){
    // open the title picker; actual approval happens after they choose a title
    store.approvingId=id;
    render();
    return;
  }
  // rejection path
  const note=(prompt('Reason for rejection (optional):')||'');
  const approvedAt=new Date().toISOString();
  try{await sb.from('orders').update({status,approver_id:store.account.uid,approver_name:store.account.name,approver_note:note,approved_at:approvedAt}).eq('id',id);}catch(e){}
  const o=store.approvals.find(x=>x.id===id);if(o){o.status=status;o.approver_note=note;o.approved_at=approvedAt;o.approver_name=store.account.name;}
  render();
}
// complete an approval once the approver has chosen their title
async function confirmApproval(id,title){
  if(!sb)return;
  const approvedAt=new Date().toISOString();
  const d=new Date();
  const ymd=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  const rand=Math.random().toString(36).slice(2,6).toUpperCase();
  const ref=`PIQ-${ymd}-${rand}`;
  try{await sb.from('orders').update({status:'approved',approver_id:store.account.uid,approver_name:store.account.name,approver_title:title,approver_note:'',approved_at:approvedAt,approval_ref:ref}).eq('id',id);}catch(e){}
  const o=store.approvals.find(x=>x.id===id);if(o){o.status='approved';o.approver_title=title;o.approved_at=approvedAt;o.approval_ref=ref;o.approver_name=store.account.name;}
  store.approvingId=null;
  render();
}

async function uploadSiteVisitPhoto(file){
  const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
  const path=store.account.uid+'/'+Date.now()+'.'+ext;
  const {error}=await sb.storage.from('site-visit-photos').upload(path,file,{upsert:true});
  if(error){throw error;}
  const {data}=sb.storage.from('site-visit-photos').getPublicUrl(path);
  return data.publicUrl;
}
async function saveSiteVisit(){
  const d=store.svDraft||{};
  const project=(document.getElementById('sv_project')||{}).value||'';
  const location=(document.getElementById('sv_location')||{}).value||'';
  const w=+(document.getElementById('sv_w')||{}).value||null;
  const h=+(document.getElementById('sv_h')||{}).value||null;
  const dep=+(document.getElementById('sv_d')||{}).value||null;
  const notes=(document.getElementById('sv_notes')||{}).value||'';
  if(!project.trim()){store.svMsg='Please enter a project name.';store.svErr=true;render();return;}
  store.svBusy=true;store.svMsg='';store.svErr=false;render();
  const row={
    company_id:store.account.companyId, site_engineer_id:store.account.uid,
    site_engineer_name:store.account.name||store.account.email,
    project_name:project, location_name:location, site_w:w, site_h:h, site_d:dep,
    notes:notes, photos:d.photos||[], status:'open'
  };
  try{
    const {data,error}=await sb.from('site_visits').insert(row).select().single();

function orderHTML(){
  const lin=optimiseLinear(store.stockLen,store.linKerf,store.linRows.filter(r=>r.len>0&&r.qty>0));
  const sh=optimiseSheets(store.sheetW,store.sheetH,store.sheetKerf,store.grain,store.sheetRows.filter(r=>r.w>0&&r.h>0&&r.qty>0).map(r=>({...r,...cutSize(r)})));
  let paintL=0,paintC=0;store.paintRows.forEach(r=>{const p=paintCalc(r);paintL+=p.litres;paintC+=p.cost;});
  const linOff=offerLinear(store.linCode,store.linThk,store.stockLen), shOff=offerSheet(store.sheetCode,store.sheetThk,store.sheetW,store.sheetH);
  const linC=lin.barCount*linOff.price, shC=sh.sheetCount*shOff.price;
  // assembly totals
  let assyTotal=0; const assyResults=store.assemblyRows.map(r=>({row:r,res:assemblyCost(r)}));
  assyResults.forEach(a=>assyTotal+=a.res.total);
  // custom assemblies
  let customTotal=0; const customResults=store.customAssemblies.map(ca=>({ca,res:customCost(ca)}));
  customResults.forEach(a=>customTotal+=a.res.total);
  // lipping totals across ALL panels
  const lipAll=lipDemand(store.sheetRows.filter(r=>r.w>0&&r.h>0&&r.qty>0));
  let lipTotalLM=0, lipCost=0;
  lipAll.forEach(l=>{lipTotalLM+=l.totalMM/1000;lipCost+=l.cost;});
  const grand=linC+shC+paintC+assyTotal+lipCost+customTotal;
  // per-supplier split — every line attributed to its chosen supplier
  const bySup={};
  const add=(s,line,cost)=>{const k=s||'(no supplier set)';if(!bySup[k])bySup[k]={lines:[],total:0};bySup[k].lines.push(line);bySup[k].total+=cost;};
  if(lin.barCount>0) add(linOff.supplier, {item:`Linear ${store.linCode} ${store.linThk}mm @ ${fmt(store.stockLen)}${u()}`, qty:lin.barCount+' bars', cost:linC}, linC);
  if(sh.sheetCount>0) add(shOff.supplier, {item:`Sheet ${store.sheetCode} ${store.sheetThk}mm @ ${fmt(store.sheetW)}×${fmt(store.sheetH)}`, qty:sh.sheetCount+' sheets', cost:shC}, shC);
  lipAll.forEach(l=>{if(l.cost>0)add(l.supplier,{item:`Lipping ${l.code} ${l.thk}mm @ ${fmt(l.stockLen)}${u()}`,qty:l.lengthsToBuy+' lengths ('+(l.totalMM/1000).toFixed(1)+' LM net)',cost:l.cost},l.cost);});
  store.paintRows.forEach(r=>{const p=paintCalc(r);if(p.cost>0)add(p.supplier, {item:`Paint ${r.stage||''} ${r.code} (${zoneName(r.zone)})`, qty:p.litres.toFixed(1)+' L', cost:p.cost}, p.cost);});
  assyResults.forEach(a=>{const tpl=ASSEMBLIES[a.row.type];a.res.items.forEach(it=>{if(it.cost>0)add(it.supplier,{item:`${tpl?tpl.name:a.row.type} · ${it.desc}${it.code?' ['+it.code+']':''} (${zoneName(a.row.zone)})`,qty:it.qty+' '+(it.unit||''),cost:it.cost},it.cost);});});
  customResults.forEach(a=>{a.res.items.forEach(it=>{if(it.cost>0)add(it.supplier,{item:`${a.ca.name} · ${it.name||it.code} (${zoneName(a.ca.zone)})`,qty:it.qty+' '+(it.unit||''),cost:it.cost},it.cost);});});
  const supEntries=Object.entries(bySup).sort((a,b)=>b[1].total-a[1].total);
  store._supEntries=supEntries;
  if(!store.myOrdersLoaded){loadMyOrders();}
  if(!store.catAllLoaded){loadCatalogueAll();}
  const projOrders=(store.myOrders||[]).filter(o=>o.project_id===_workspaceId);
  const statusColor=s=>s==='approved'?'var(--green)':s==='sent'?'var(--blue)':s==='rejected'?'var(--red)':s==='pending_approval'?'var(--amber)':'var(--mut)';
  const statusLabel=s=>(s||'').replace('_',' ').toUpperCase();
  // list of selectable suppliers: my pinned/known + all PitchIQ suppliers
  const knownSuppliers=Array.from(new Set([
    ...supEntries.map(([s])=>s),
    ...((store.catalogueAll||[]).map(c=>c.supplier_name).filter(Boolean))
  ])).filter(s=>s&&s!=='(no supplier set)').sort();

  // ---- self-contained per-supplier order card ----
  const supplierCard=([sup,d],si)=>{
    // the supplier this card actually sends to (reassigned target if chosen, else its own name)
    const target=(store._supReassign&&store._supReassign[si])||sup;
    // match a prior order by EITHER the card's own name or the reassigned target,
    // so a reassigned order still shows its status/buttons on this card
    const priorO=(store.myOrders||[]).filter(o=>(o.supplier_name===target||o.supplier_name===sup) && o.project_id===_workspaceId).sort((a,b)=>(b.revision||1)-(a.revision||1))[0];
    const status=priorO?priorO.status:null;
    const pending=status==='pending_approval';
    let actionRow='';
    if(pending){
      actionRow=`<div style="margin-top:10px;padding:9px;border:1px solid var(--amber);color:var(--amber);text-align:center;font-size:11px;letter-spacing:1px;border-radius:4px">⏳ REVISION ${priorO.revision||1} — PENDING MANAGER APPROVAL</div>`;
    }else{
      actionRow=`<button class="zadd" data-submitsupplier="${si}" style="margin-top:10px;border-color:var(--amber);color:var(--amber);width:100%">▲ ${priorO?`SUBMIT REVISION ${(priorO.revision||1)+1}`:'SUBMIT THIS ORDER FOR APPROVAL'}</button>`;
    }
    // status / green approve line shown inline on the same card
    let statusLine='';
    if(priorO){
      const col=statusColor(status);
      statusLine=`<div style="margin-top:10px;padding:8px 10px;border-left:4px solid ${col};background:rgba(255,255,255,0.03);font-size:11px">
        <strong style="color:${col}">${statusLabel(status)}</strong> · Rev ${priorO.revision||1}${priorO.approver_name?` · by ${priorO.approver_name}${priorO.approver_title?' ('+priorO.approver_title+')':''}`:''}${priorO.approved_at?` · ${new Date(priorO.approved_at).toLocaleDateString()}`:''}
        ${priorO.approver_note?`<div style="color:var(--mut);margin-top:3px">Note: ${priorO.approver_note}</div>`:''}
        <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
          <button class="zadd" data-thread="${priorO.id}" style="padding:5px 10px;font-size:10px;border-color:var(--blue);color:var(--blue)">💬 MESSAGES${unreadBadge(priorO.id)}</button>
          ${status==='approved'?`<button class="zadd" data-cert="${priorO.id}" style="padding:5px 10px;font-size:10px;border-color:var(--green);color:var(--green)">⎙ CERTIFICATE</button> <button class="zadd" data-sendsup="${priorO.id}" style="padding:5px 10px;font-size:10px;border-color:var(--amber);color:var(--amber)">▶ SEND TO SUPPLIER</button>`:''}
          ${status==='sent'?`<button class="zadd" data-cert="${priorO.id}" style="padding:5px 10px;font-size:10px;border-color:var(--green);color:var(--green)">⎙ CERTIFICATE</button> <span style="font-size:10px;color:var(--blue);align-self:center">✓ SENT TO SUPPLIER</span>`:''}
        </div>
        ${threadPanel(priorO)}
      </div>`;
    }
    return `<div class="orderCard" style="margin-bottom:14px"><div class="orderHead" style="display:flex;justify-content:space-between;align-items:center"><span>◆ ORDER · ${sup}</span><span class="cost">${money(d.total)}</span></div><div class="orderBody">
      <div style="font-size:12px">${d.lines.map(l=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--line)"><span>${l.item}</span><span style="color:var(--mut)">${l.qty} · ${money(l.cost)}</span></div>`).join('')}</div>
      <div style="margin-top:10px;font-size:11px;color:var(--mut)">Send this order to:
        <select class="sel" data-reassign="${si}" style="margin-left:6px;padding:6px">
          <option value="">${sup}${knownSuppliers.includes(sup)?'':' (current)'}</option>
          ${knownSuppliers.filter(s=>s!==sup).map(s=>`<option value="${s}">${s}</option>`).join('')}
        </select></div>
      ${actionRow}
      ${statusLine}
    </div></div>`;
  };

  const supplierCards = supEntries.length
    ? supEntries.map(supplierCard).join('')
    : '<div class="empty">No supplier-attributed items yet — set prices and suppliers in the Price Book, or pull items from the Catalogue.</div>';

  const wholeOrderCard = supEntries.length ? `<div class="orderCard" style="margin-bottom:14px"><div class="orderHead">◆ SEND WHOLE ORDER TO ONE SUPPLIER</div><div class="orderBody">
    <div class="orderSub">Submit the entire project order (all items above) as a single submission for approval — use this when one supplier provides everything.</div>
    <button class="cta" id="submitAll" style="width:100%;margin-top:10px">▲ SUBMIT WHOLE ORDER FOR APPROVAL</button>
  </div></div>` : '';

  const costSummary = `<div class="orderCard"><div class="orderHead">◆ MATERIAL ORDER & COST — SUMMARY (glance)</div><div class="orderBody">
    <div class="orderLine"><span>Linear stock @ ${fmt(store.stockLen)}${u()} <small style="color:var(--mut)">${linOff.supplier||'—'}${linOff.fellBack?' (fallback)':''}</small></span><span class="orderQty">${lin.barCount} <small>bars · ${money(linC)}</small></span></div>
    <div class="orderLine"><span>Sheet board @ ${fmt(store.sheetW)}×${fmt(store.sheetH)} <small style="color:var(--mut)">${shOff.supplier||'—'}${shOff.fellBack?' (fallback)':''}</small></span><span class="orderQty">${sh.sheetCount} <small>sheets · ${money(shC)}</small></span></div>
    <div class="orderLine"><span>Lipping (${lipAll.length} type${lipAll.length===1?'':'s'})</span><span class="orderQty">${lipTotalLM.toFixed(1)} <small>LM · ${money(lipCost)}</small></span></div>
    <div class="orderLine"><span>Paint (${store.paintRows.length} coat row${store.paintRows.length===1?'':'s'})</span><span class="orderQty">${paintL.toFixed(1)} <small>L · ${money(paintC)}</small></span></div>
    <div class="orderLine"><span>Assemblies (${store.assemblyRows.length})</span><span class="orderQty">${money(assyTotal)}</span></div>
    <div class="orderLine"><span>Custom assemblies (${store.customAssemblies.length})</span><span class="orderQty">${money(customTotal)}</span></div>
    <div class="orderLine" style="font-size:13px"><span>Subtotal</span><span>${money(grand)}</span></div>
    <div class="orderLine" style="font-size:13px"><span>Tax / VAT <input class="num numS" type="number" id="taxPct" value="${store.taxPct}" style="width:48px;margin-left:6px"> %</span><span>${money(grand*(store.taxPct||0)/100)}</span></div>
    <div class="orderTotal"><span>TOTAL INC. TAX</span><span>${money(grand*(1+(store.taxPct||0)/100))}</span></div>
  </div></div>`;

  return `<div class="hint" style="padding-top:14px">Each supplier's order is its own card below — submit it for approval, track its status, message about it, and get its certificate all in one place. Choose a different supplier per card if you want to send the same items elsewhere.</div>
    ${supplierCards}
    ${wholeOrderCard}
    <button class="bigPrint" id="printOrder">⊞ EXPORT FULL ESTIMATE TO EXCEL</button>
    ${costSummary}`;}

function zoneSel(val,kind,id){return `<select class="sel" data-${kind}="${id}" data-k="zone">${store.zones.map(z=>`<option value="${z.id}" ${z.id===val?'selected':''}>${z.name}</option>`).join('')}</select>`;}
function partSel(val,id){return `<select class="sel" style="width:96px" data-sheet="${id}" data-k="part">${PART_TYPES.map(p=>`<option value="${p}" ${p===(val||'')?'selected':''}>${p||'— part —'}</option>`).join('')}</select>`;}
function itemSel(val,other,id){
  const isOther=(val==='Other');
  const dd=`<select class="sel" style="width:120px" data-sheet="${id}" data-k="item">${ITEM_TYPES.map(p=>`<option value="${p}" ${p===(val||'')?'selected':''}>${p||'— item —'}</option>`).join('')}</select>`;
  const tx=isOther?`<input class="cell" style="width:110px;margin-top:4px" value="${other||''}" data-sheet="${id}" data-k="itemOther" placeholder="type item">`:'';
  return `<div style="display:flex;flex-direction:column">${dd}${tx}</div>`;
}
// the effective item name for a row (custom text if Other, else the dropdown value)
function itemName(r){return (r.item==='Other'?(r.itemOther||'Other'):(r.item||''));}
// finish choice per piece: none / prime / paint / both
function finishSel(val,id){const opts=[['none','None'],['prime','Prime only'],['paint','Paint only'],['both','Prime+Paint']];return `<select class="sel" style="width:104px" data-sheet="${id}" data-k="pfinish">${opts.map(o=>`<option value="${o[0]}" ${(val||'none')===o[0]?'selected':''}>${o[1]}</option>`).join('')}</select>`;}
function paintFacesSel(val,id){const opts=[[1,'1 face'],[2,'2 faces']];return `<select class="sel" style="width:74px" data-sheet="${id}" data-k="paintFaces">${opts.map(o=>`<option value="${o[0]}" ${(+val||1)===o[0]?'selected':''}>${o[1]}</option>`).join('')}</select>`;}
function pieceRef(r,idx){
  const proj=(store.projectName||'PRJ').replace(/[^A-Za-z0-9]/g,'').slice(0,4).toUpperCase()||'PRJ';
  const zone=(store.zones.find(z=>z.id===r.zone)||{}).name||('Z'+r.zone);
  const z=zone.replace(/[^A-Za-z0-9]/g,'').slice(0,3).toUpperCase();
  const part=(r.part||'PT').replace(/[^A-Za-z0-9]/g,'').slice(0,3).toUpperCase();
  return `${proj}-${z}-${part}-${String(idx+1).padStart(2,'0')}`;
}
function lipSel(val,id){return `<select class="sel" data-sheet="${id}" data-k="lip">${LIP_PRESETS.map(mm=>`<option value="${mm}" ${mm===val?'selected':''}>${store.unit==='mm'?mm:(mm/MM_PER_IN).toFixed(2)}</option>`).join('')}</select>`;}
function edgeSel(val,id){return `<select class="sel" data-sheet="${id}" data-k="edge">${EDGE_OPTS.map(o=>`<option value="${o.v}" ${o.v===(val||'0')?'selected':''}>${o.t}</option>`).join('')}</select>`;}

      if(!sb){return sErr('No connection to Supabase.');}

// parse pasted/CSV rows: type,supplier,code,thk,len_or_w,h,price
function importRows(text){
  if(!text||!text.trim()){return;}
  const lines=text.trim().split(/\r?\n/).map(l=>l.split(/[,\t]/).map(c=>c.trim()));
  let added=0;
  lines.forEach(c=>{
    if(c.length<4)return;
    const type=(c[0]||'').toLowerCase();
    if(!['linear','sheet','paint'].includes(type))return; // skips header row
    const supplier=c[1]||'', code=c[2]||'';
    if(type==='linear'){const thk=+c[3]||0,len=Math.round(toMM(+c[4]||0)),price=+c[6]||+c[5]||0;if(code&&len){store.priceBook.linear.push({supplier,code,thk,len,price});added++;}}
    else if(type==='sheet'){const thk=+c[3]||0,w=Math.round(toMM(+c[4]||0)),h=Math.round(toMM(+c[5]||0)),price=+c[6]||0;if(code&&w&&h){store.priceBook.sheet.push({supplier,code,thk,w,h,price});added++;}}
    else if(type==='paint'){const price=+c[6]||+c[3]||0;if(code){store.priceBook.paint.push({supplier,code,price});added++;}}
  });
  render();
  const msg=document.getElementById('importMsg');if(msg)msg.textContent=added?`✓ Imported ${added} row(s)`:'No valid rows found — check the column order.';
}

// Reliably create/find a company and link the contractor's profile to it.
// Waits for the profile row (created by a DB trigger) and verifies the save.
async function linkContractorCompany(uid,companyName,fullName,phone,location){
  if(!sb||!uid)return;
  // 1) ensure the profile row exists (trigger may lag right after signup)
  let profExists=false;
  for(let i=0;i<5 && !profExists;i++){
    try{const {data}=await sb.from('profiles').select('id').eq('id',uid).maybeSingle();if(data)profExists=true;}catch(e){}
    if(!profExists)await new Promise(r=>setTimeout(r,500));
  }
  // 2) find existing company by name, else create it
  let companyId=null;
  try{const {data:found}=await sb.from('companies').select('id').eq('name',companyName).maybeSingle();if(found)companyId=found.id;}catch(e){}
  if(!companyId){
    try{const {data:co}=await sb.from('companies').insert({name:companyName}).select().single();if(co)companyId=co.id;}catch(e){}
  }
  // 3) update the profile, retry until it sticks
  for(let i=0;i<4;i++){
    try{await sb.from('profiles').update({full_name:fullName,phone:phone,location:location,company_id:companyId,role:'owner',account_type:'contractor'}).eq('id',uid);}catch(e){}
    // verify
    try{const {data:chk}=await sb.from('profiles').select('company_id').eq('id',uid).maybeSingle();if(chk&&chk.company_id)return;}catch(e){}
    await new Promise(r=>setTimeout(r,500));
  }
}
async function loadSession(){
  if(!sb){render();return;}
  let session=null;
  try{
    const res=await withTimeout(sb.auth.getSession(),12000,'Loading your session');
    session=res.data?res.data.session:null;
  }catch(ex){
    // Supabase unreachable/slow — don't hang. Show the login screen with a notice.
    store.account=null;store.authBusy=false;
    store.authMsg=(ex.message||'Could not reach the server.')+' ';
    render();return;
  }
  if(!session){store.account=null;store.authBusy=false;render();return;}
  const uid=session.user.id;
  let prof=null;
  // Read the profile; retry once after a short wait if it's not ready yet
  // (right after login the row/policies can lag, which previously defaulted
  // everyone to 'contractor' and sent managers to the wrong screen).
  for(let attempt=0;attempt<2 && !prof;attempt++){
    try{const {data}=await sb.from('profiles').select('*').eq('id',uid).maybeSingle();prof=data;}catch(e){}
    if(!prof&&attempt===0){await new Promise(r=>setTimeout(r,600));}
  }
  let companyName='';
  if(prof&&prof.company_id){try{const {data:co}=await sb.from('companies').select('name').eq('id',prof.company_id).maybeSingle();companyName=co?co.name:'';}catch(e){}}
  // Determine account type robustly: trust profiles.account_type, but if a
  // supplier_profiles row exists for this user, they are a supplier regardless.
  let acctType=prof?(prof.account_type||'contractor'):'contractor';
  let supplierName='';
  try{
    const {data:sp}=await sb.from('supplier_profiles').select('supplier_name').eq('id',uid).maybeSingle();
    if(sp){ acctType='supplier'; supplierName=sp.supplier_name||''; }
  }catch(e){}
  store.account={
    uid, email:session.user.email, accountType:acctType,
    company:acctType==='supplier'?(supplierName||'(supplier)'):(companyName||'(no company)'), companyId:prof?prof.company_id:null,
    name:prof?prof.full_name:'', phone:prof?prof.phone:'', location:prof?prof.location:'',
    role:prof?prof.role:'member', plan:prof?prof.plan:'trial',
    trialEnds:prof?prof.trial_ends:new Date(Date.now()+30*864e5).toISOString(),
  };
  store.authBusy=false;store.authMsg='';
  // Clear any workspace data cached in this browser from a *different* account,
  // so a freshly-logged-in account starts from its own cloud data, not leftovers.
  if(store._loadedUid!==uid){
    store.zones=[{id:1,name:'Zone 1'}]; store.zoneFilter='all';
    store.linRows=[{id:Date.now(),zone:1,label:'Stud',code:'STUD-92',thk:92,len:2400,qty:10}]; store.sheetRows=[]; store.paintRows=[];
    store.assemblyRows=[]; store.customAssemblies=[]; store.bankedDrops=[];
    _workspaceId=null; store.projectName='My First Project';
    store.projects=[]; store.projectsLoaded=false;
    store.myOrders=[]; store.myOrdersLoaded=false;
    store._loadedUid=uid;
  }
  if(acctType!=='supplier'){ await cloudLoad(); }
  subscribeOrders();
  loadUnread();
  render();
}
// react to auth changes (magic-link return, token refresh)
if(sb){ sb.auth.onAuthStateChange((_e,_s)=>{ loadSession(); }); }
loadSession();
</script>
</body>
</html>
